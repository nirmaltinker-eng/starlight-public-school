<!doctype html><html lang="en" data-root=""><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Student Login - Starlight Public School</title><link rel="stylesheet" href="assets/lesson-pages.css"><link rel="stylesheet" href="assets/test-pages.css"><link rel="stylesheet" href="assets/site-fixes.css"><link rel="stylesheet" href="assets/theme.css"></head><body><header class="lesson-header"><a class="brand" href="index.html"><img src="school-logo.png" alt="Starlight Public School logo"><span><strong>Starlight Public School</strong><small>A place where dreams take flight.</small></span></a></header><nav class="lesson-nav"><a href="index.html">Home</a><a href="notes.html">Notes</a><a class="test-nav" href="tests.html">Test</a><a href="gallery.html">Gallery</a><a class="login-nav" href="login.html">Login</a><button class="theme-toggle" type="button">☀ Light</button></nav><main class="login-box"><h1>Student Login</h1><p>Notes सभी के लिए खुले हैं। Chapter tests खोलने के लिए student details दर्ज करें।</p><form id="login-form"><label>Student Name<input id="student-name" required autocomplete="name"></label><label>Class<select id="student-class" required><option value="">Select class</option><option>6</option><option>7</option><option>8</option><option>9</option><option>10</option></select></label><label>Roll Number<input id="student-roll" required inputmode="numeric"></label><label>School Access Code<input id="student-code" required type="password" autocomplete="current-password"></label><p class="form-error" id="form-error"></p><button type="submit">Login & Open Tests</button></form></main><footer class="site-footer"><p>&copy; 2026 Starlight Public School. Website by Nirmal Tinker. · <a href="notes.html">Notes</a></p></footer><script src="assets/auth.js"></script><script>document.getElementById('login-form').addEventListener('submit',function(event){event.preventDefault();const code=document.getElementById('student-code').value.trim();const error=document.getElementById('form-error');if(code!=='SLPS2026'){error.textContent='School access code सही नहीं है।';return;}window.SLPS_AUTH.login({name:document.getElementById('student-name').value.trim(),className:document.getElementById('student-class').value,roll:document.getElementById('student-roll').value.trim()});const next=new URLSearchParams(location.search).get('next');location.href=next||'tests.html';});</script><script src="assets/theme.js"></script></body></html>
