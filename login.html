<!doctype html>
<html lang="hi" data-root="">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="Star Light Public School secure student login">
  <title>Student Login - Star Light Public School</title>
  <link rel="stylesheet" href="assets/lesson-pages.css">
  <link rel="stylesheet" href="assets/test-pages.css">
  <link rel="stylesheet" href="assets/site-fixes.css">
  <link rel="stylesheet" href="assets/theme.css">
</head>
<body>
  <header class="lesson-header">
    <a class="brand" href="index.html"><img src="school-logo.png" alt="Star Light Public School logo"><span><strong>Star Light Public School</strong><small>A place where dreams take flight.</small></span></a>
  </header>
  <nav class="lesson-nav"><a href="index.html">Home</a><a href="notes.html">Notes</a><a class="test-nav" href="tests.html">Test</a><a href="gallery.html">Gallery</a><a class="login-nav" href="login.html" aria-current="page">Login</a><button class="theme-toggle" type="button">Light theme</button></nav>
  <main class="login-box">
    <h1>Student Login</h1>
    <p>Chapter tests खोलने के लिए school द्वारा दिया गया email और password दर्ज करें।</p>
    <p id="login-status" class="login-status" aria-live="polite">Secure login तैयार हो रहा है…</p>
    <form id="login-form">
      <label>Email Address<input id="student-email" required type="email" autocomplete="username" placeholder="student@example.com"></label>
      <label>Password<input id="student-password" required type="password" autocomplete="current-password" minlength="6"></label>
      <p class="form-error" id="form-error" aria-live="assertive"></p>
      <button type="submit">Login &amp; Open Tests</button>
      <button type="button" id="forgot-password" class="secondary-button">Forgot Password</button>
    </form>
  </main>
  <footer class="site-footer"><p>&copy; 2026 Star Light Public School. Website by Nirmal Tinker. · <a href="notes.html">Notes</a></p></footer>
  <script src="assets/auth.js"></script>
  <script src="assets/login.js"></script>
  <script src="assets/theme.js"></script>
</body>
</html>
