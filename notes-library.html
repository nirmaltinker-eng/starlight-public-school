<!doctype html><html data-root="" lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="description" content="Class 6 to 10 notes and RBSE 2026-27 revision library"><title>Notes Library | Star Light Public School</title><link rel="stylesheet" href="assets/learning.css"><link rel="stylesheet" href="assets/site-fixes.css"><link rel="stylesheet" href="assets/theme.css"></head><body><header class="site-header"><a class="brand" href="index.html"><img src="school-logo.png" alt="Star Light Public School logo"><span><b>Star Light Public School</b><small>A place where dreams take flight</small></span></a><nav><a href="index.html">Home</a><a aria-current="page" href="notes.html">Notes</a><a href="gallery.html">Gallery</a><a href="staff.html">Staff</a><a href="about.html">About Us</a><a href="contact.html">Contact Us</a><a class="login-nav" href="login.html">Login</a><button class="theme-toggle" type="button">☀ Light</button></nav></header><main><section class="hero"><p class="eyebrow">Study smarter</p><h1 id="page-title">Notes Library</h1><p id="page-copy">Class-wise quick notes, important concepts and practice prompts.</p></section><section class="wrap"><div class="notice" id="source-note"></div><div class="toolbar"><label>Class<select id="class-select"></select></label><label>Subject<select id="subject-select"></select></label><label>Search topics<input id="search" type="search" placeholder="e.g. motion, algebra, grammar"></label></div><div id="subject-grid" class="subject-grid"></div><h2 class="section-title" id="chapter-title">Quick Notes</h2><div id="chapters" class="chapter-grid"></div></section></main><footer><span>© 2026 Star Light Public School</span><span>RBSE-aligned study support · Teacher review recommended</span></footer><script src="assets/notes-data.js"></script><script>
const data=window.NOTES_DATA,params=new URLSearchParams(location.search),classSelect=document.querySelector('#class-select'),subjectSelect=document.querySelector('#subject-select'),search=document.querySelector('#search');
Object.keys(data).forEach(c=>classSelect.add(new Option(`Class ${c}`,c)));classSelect.value=data[params.get('class')]?params.get('class'):'9';
function subjects(){subjectSelect.innerHTML='';Object.keys(data[classSelect.value].subjects).forEach(s=>subjectSelect.add(new Option(s,s)));if(data[classSelect.value].subjects[params.get('subject')])subjectSelect.value=params.get('subject')}
function render(){const c=classSelect.value,s=subjectSelect.value,entry=data[c],chapters=entry.subjects[s],q=search.value.trim().toLowerCase();document.querySelector('#page-title').textContent=entry.label;document.querySelector('#page-copy').textContent=`${s} quick notes, key concepts and practice guidance.`;const note=document.querySelector('#source-note');note.innerHTML=entry.source.startsWith('Official')?`<strong>Source:</strong> <a href="${entry.source.split('https://')[1]?'https://'+entry.source.split('https://')[1]:''}" target="_blank" rel="noopener">${entry.source.split(': https')[0]}</a>`:`<strong>Coverage note:</strong> ${entry.source}`;document.querySelector('#chapter-title').textContent=`${s} · ${chapters.length} Topics`;document.querySelector('#subject-grid').innerHTML=Object.keys(entry.subjects).map(name=>`<button class="chip ${name===s?'active':''}" data-subject="${name}">${name}</button>`).join('');document.querySelectorAll('[data-subject]').forEach(b=>b.onclick=()=>{subjectSelect.value=b.dataset.subject;render()});const filtered=chapters.filter(x=>(x[0]+' '+x[1]).toLowerCase().includes(q));document.querySelector('#chapters').innerHTML=filtered.map((x,i)=>`<details class="chapter"><summary>${i+1}. ${x[0]}</summary><div class="chapter-body"><p>${x[1]}</p><h4>Key points</h4><ul><li>Define the main terms in your own words.</li><li>Use one labelled example, diagram or formula wherever applicable.</li><li>Connect the concept with an everyday or Rajasthan-based example.</li></ul><p class="practice"><strong>Practice:</strong> Write a 3-mark explanation of “${x[0]}”, then make five one-line revision questions.</p></div></details>`).join('')||'<p>No matching topic found.</p>';history.replaceState(null,'',`?class=${c}&subject=${encodeURIComponent(s)}`)}
subjects();classSelect.onchange=()=>{subjects();render()};subjectSelect.onchange=render;search.oninput=render;render();
</script><script src="assets/auth.js"></script><script src="assets/theme.js"></script></body></html>
